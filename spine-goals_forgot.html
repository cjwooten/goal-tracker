<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #ffffff;
    --bg2:       #f5f4f0;
    --bg3:       #efede8;
    --border1:   rgba(0,0,0,0.08);
    --border2:   rgba(0,0,0,0.15);
    --border3:   rgba(0,0,0,0.25);
    --text1:     #1a1a18;
    --text2:     #5a5a56;
    --text3:     #9a9892;
    --radius-md: 8px;
    --radius-lg: 12px;
    --font:      -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --logo-fill: #2E2E2B;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --logo-fill: #EFEDE7;
      --bg:      #1c1c1a;
      --bg2:     #262624;
      --bg3:     #2e2e2b;
      --border1: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.13);
      --border3: rgba(255,255,255,0.22);
      --text1:   #e8e6df;
      --text2:   #9a9890;
      --text3:   #5e5d58;
    }
  }

  body {
    font-family: var(--font);
    background: var(--bg3);
    color: var(--text1);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }

  .card {
    background: var(--bg);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 2.5rem 2rem 2rem;
    width: 100%;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .logo-wrap { margin-bottom: 2rem; }

  /* ── Back link ── */
  .back-link {
    align-self: flex-start;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    color: var(--text3);
    text-decoration: none;
    margin-bottom: 1.5rem;
    border-radius: 4px;
    padding: 2px 0;
    transition: color 0.12s;
  }
  .back-link:hover { color: var(--text2); }
  .back-link svg { flex-shrink: 0; }

  /* ── Heading block ── */
  .heading { align-self: flex-start; margin-bottom: 1.5rem; }
  .heading h1 { font-size: 15px; font-weight: 500; color: var(--text1); margin-bottom: 5px; }
  .heading p  { font-size: 13px; color: var(--text2); line-height: 1.6; }

  /* ── Fields ── */
  .fields { display: flex; flex-direction: column; gap: 5px; width: 100%; margin-bottom: 1.25rem; }
  .field-label { font-size: 11px; color: var(--text2); letter-spacing: 0.02em; margin-bottom: 5px; display: block; }
  .field-input {
    width: 100%;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-md);
    padding: 10px 12px;
    font-size: 14px;
    font-family: var(--font);
    color: var(--text1);
    background: var(--bg2);
    outline: none;
    transition: border-color 0.15s, background 0.15s;
    -webkit-appearance: none;
  }
  .field-input:focus {
    border-color: #93c5fd;
    background: var(--bg);
    box-shadow: 0 0 0 3px rgba(147,197,253,0.2);
  }
  .field-input::placeholder { color: var(--text3); }
  .field-input.error { border-color: #fca5a5; }
  .field-error { font-size: 11px; color: #dc2626; margin-top: 4px; display: none; }

  /* ── Button ── */
  .btn-primary {
    width: 100%;
    background: var(--text1);
    color: var(--bg);
    border: none;
    border-radius: var(--radius-md);
    padding: 11px 0;
    font-size: 14px;
    font-family: var(--font);
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
    letter-spacing: 0.01em;
  }
  .btn-primary:hover { opacity: 0.82; }
  .btn-primary:active { opacity: 0.7; }
  .btn-primary:disabled { opacity: 0.35; cursor: default; }

  /* ── Success state ── */
  .success-state {
    display: none;
    flex-direction: column;
    align-items: center;
    text-align: center;
    width: 100%;
    gap: 0;
  }
  .success-icon {
    width: 44px; height: 44px;
    background: #d1fae5;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 1rem;
    flex-shrink: 0;
  }
  .success-title { font-size: 15px; font-weight: 500; color: var(--text1); margin-bottom: 8px; }
  .success-body  { font-size: 13px; color: var(--text2); line-height: 1.6; margin-bottom: 1.5rem; }
  .success-email { color: var(--text1); font-weight: 500; }
  .btn-secondary {
    width: 100%;
    background: var(--bg2);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-md);
    padding: 10px 0;
    font-size: 13px;
    font-family: var(--font);
    color: var(--text1);
    cursor: pointer;
    transition: background 0.15s;
    margin-bottom: 10px;
  }
  .btn-secondary:hover { background: var(--bg3); }

  /* ── Helper ── */
  .helper {
    margin-top: 1.25rem;
    font-size: 10px;
    color: var(--text3);
    text-align: center;
    line-height: 1.6;
  }
  .helper a { color: var(--text2); text-decoration: none; border-bottom: 0.5px solid var(--border2); transition: color 0.12s; }
  .helper a:hover { color: var(--text1); }

  /* ── Spinner ── */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: inline-block;
  }

  @media (max-width: 500px) {
    .field-input { font-size: 16px !important; }
  }
</style>

  <!-- Heading — hidden on success -->
  <div class="heading" id="form-heading">
    <h1>Reset your password</h1>
    <p>Enter your email and we'll send you a link to set a new password.</p>
  </div>

  <!-- Form — hidden on success -->
  <div id="reset-form" style="width:100%">
    <div class="fields">
      <label class="field-label" for="f-email">Email</label>
      <input class="field-input" id="f-email" type="email" placeholder="email@example.com"
        autocomplete="email" oninput="clearError()"
        onkeydown="if(event.key==='Enter')submit()">
      <span class="field-error" id="err-email"></span>
    </div>
    <button class="btn-primary" id="submit-btn" onclick="submit()">Send reset link</button>
    <p class="helper">Check your spam folder if it doesn't arrive within a minute.</p>
  </div>

  <!-- Success state — shown after submit -->
  <div class="success-state" id="success-state">
    <div class="success-icon">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="#065f46" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3,10 8,15 17,5"/>
      </svg>
    </div>
    <div class="success-title">Check your inbox</div>
    <p class="success-body">We sent a reset link to <span class="success-email" id="sent-email"></span>. Follow the link to choose a new password.</p>
    <button class="btn-secondary" onclick="window.location.href='spine-goals_login.html'">Back to sign in</button>
    <button class="btn-secondary" id="resend-btn" onclick="resend()" style="background:none;border-color:transparent;color:var(--text3);font-size:12px;margin-bottom:0">Resend email</button>
  </div>

</div>

<script>
  // ── Supabase client ─────────────────────────────────────────────────────────
  const SUPABASE_URL='https://gygdmdaohsiiphqqufgn.supabase.co';
  const SUPABASE_ANON_KEY='sb_publishable_06vce6cx2R4-rL-9PdZ9hg_GyxAbNYa';
  const _supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

  // Pre-fill email if passed from login screen
  const _params = new URLSearchParams(window.location.search);
  if (_params.get('email')) document.getElementById('f-email').value = _params.get('email');

  let _lastEmail = '';

  async function submit() {
    const email = document.getElementById('f-email').value.trim();
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      showError('Please enter a valid email address.');
      return;
    }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';

    const { error } = await _supabase.auth.resetPasswordForEmail(email, {
      redirectTo: 'https://spinegoals.com'
    });

    btn.disabled = false;
    btn.textContent = 'Send reset link';

    if (error) {
      showError(error.message);
    } else {
      _lastEmail = email;
      showSuccess(email);
    }
  }

  function showSuccess(email) {
    document.getElementById('sent-email').textContent = email;
    document.getElementById('reset-form').style.display = 'none';
    document.getElementById('form-heading').style.display = 'none';
    const s = document.getElementById('success-state');
    s.style.display = 'flex';
  }

  async function resend() {
    const btn = document.getElementById('resend-btn');
    btn.textContent = 'Sending...';
    btn.disabled = true;
    await _supabase.auth.resetPasswordForEmail(_lastEmail, {
      redirectTo: 'https://spinegoals.com'
    });
    btn.textContent = 'Sent!';
    setTimeout(() => { btn.textContent = 'Resend email'; btn.disabled = false; }, 3000);
  }

  function showError(msg) {
    const inp = document.getElementById('f-email');
    const err = document.getElementById('err-email');
    inp.classList.add('error');
    err.textContent = msg;
    err.style.display = 'block';
  }
  function clearError() {
    document.getElementById('f-email').classList.remove('error');
    document.getElementById('err-email').style.display = 'none';
  }
</script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #ffffff;
    --bg2:       #f5f4f0;
    --bg3:       #efede8;
    --border1:   rgba(0,0,0,0.08);
    --border2:   rgba(0,0,0,0.15);
    --border3:   rgba(0,0,0,0.25);
    --text1:     #1a1a18;
    --text2:     #5a5a56;
    --text3:     #9a9892;
    --radius-md: 8px;
    --radius-lg: 12px;
    --font:      -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --logo-fill: #2E2E2B;
  }

  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --logo-fill: #EFEDE7;
      --bg:      #1c1c1a;
      --bg2:     #262624;
      --bg3:     #2e2e2b;
      --border1: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.13);
      --border3: rgba(255,255,255,0.22);
      --text1:   #e8e6df;
      --text2:   #9a9890;
      --text3:   #5e5d58;
    }
  }

  /* Force dark */
  :root[data-theme="dark"] {
    --logo-fill: #EFEDE7;
    --bg:      #1c1c1a;
    --bg2:     #262624;
    --bg3:     #2e2e2b;
    --border1: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --border3: rgba(255,255,255,0.22);
    --text1:   #e8e6df;
    --text2:   #9a9890;
    --text3:   #5e5d58;
  }

  /* Force light */
  :root[data-theme="light"] {
    --logo-fill: #2E2E2B;
    --bg:        #ffffff;
    --bg2:       #f5f4f0;
    --bg3:       #efede8;
    --border1:   rgba(0,0,0,0.08);
    --border2:   rgba(0,0,0,0.15);
    --border3:   rgba(0,0,0,0.25);
    --text1:     #1a1a18;
    --text2:     #5a5a56;
    --text3:     #9a9892;
  }

  body {
    font-family: var(--font);
    background: var(--bg3);
    color: var(--text1);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container { max-width: 680px; margin: 0 auto; }

  .page-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.5rem;
  }

  .btn-new-goal { border-color: #1D9E75 !important; color: #1D9E75 !important; transition: background 0.15s, border-color 0.15s, color 0.15s; }
  .btn-new-goal:hover, .btn-new-goal:active { background: #1D9E75 !important; border-color: #1D9E75 !important; color: #fff !important; }
  .btn {
    background: var(--bg); border: 0.5px solid var(--border2);
    border-radius: var(--radius-md); padding: 7px 16px;
    font-size: 13px; color: var(--text1); cursor: pointer;
    font-family: var(--font); transition: background 0.15s; white-space: nowrap;
  }
  .btn:hover { background: var(--bg2); }
  .btn-primary { background: #d1fae5; border-color: #6ee7b7; color: #065f46; transition: background 0.15s, border-color 0.15s, color 0.15s; }
  .btn-primary:hover { background: #1D9E75; border-color: #1D9E75; color: #fff; }

  .goals-list { display: flex; flex-direction: column; gap: 10px; }

  .goal-card {
    background: var(--bg); border: 0.5px solid var(--border1);
    border-radius: var(--radius-lg); overflow: hidden; transition: border-color 0.15s;
  }
  .goal-card.expanded { border-color: var(--border2); }

  .goal-card.archived { opacity: 0.52; }
  .goal-card.archived .goal-header { cursor: default; }
  .goal-card.archived .goal-header:hover { background: transparent; }

  .goal-header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; cursor: pointer; user-select: none;
  }
  .goal-header:hover { background: var(--bg2); }

  .goal-meta { flex: 1; min-width: 0; }
  .goal-name { font-size: 14px; font-weight: 500; color: var(--text1); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .goal-sub  { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .goal-due-badge { cursor: pointer; border-radius: 3px; padding: 0 2px; margin: 0 -2px; opacity: 0.75; transition: background 0.12s, opacity 0.12s; }
  .goal-due-badge:hover { background: var(--bg3); opacity: 1; }
  .goal-due-add { cursor: pointer; font-style: italic; border-radius: 3px; padding: 0 2px; opacity: 0.22; transition: background 0.12s, opacity 0.15s; }
  .goal-header:hover .goal-due-add { opacity: 0.55; }
  .goal-due-add:hover { opacity: 1 !important; background: var(--bg2); }
  .goal-name-view { display: inline; cursor: text; border-radius: 3px; padding: 1px 3px; margin: -1px -3px; transition: background 0.12s; }
  .goal-name-view:hover { background: var(--bg2); }
  .goal-name-input { font-size: 14px; font-weight: 500; font-family: var(--font); color: var(--text1); border: 0.5px solid var(--border3); border-radius: 4px; padding: 1px 4px; background: var(--bg); outline: none; width: 100%; }

  .status-badge { font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 500; flex-shrink: 0; }
  .s-active   { background: #fef3c7; color: #92400e; }
  .s-waiting  { background: #dbeeff; color: #1d4ed8; }
  .s-done     { background: #d1fae5; color: #065f46; }
  .s-blocked  { background: #f1f0ec; color: #5a5a56; }
  .s-archived { background: #f1f0ec; color: #9a9892; }

  .chevron { font-size: 10px; color: var(--text3); transition: transform 0.2s; flex-shrink: 0; }
  .expanded .chevron { transform: rotate(90deg); }

  .goal-body { border-top: 0.5px solid var(--border1); }

  .next-banner {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 16px; background: var(--bg2);
    border-bottom: 0.5px solid var(--border1);
  }
  .next-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
  .next-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 2px; }
  .next-text  { font-size: 13px; font-weight: 500; color: var(--text1); line-height: 1.4; }
  .next-dur   { font-size: 11px; color: var(--text2); margin-top: 2px; }

  .progress-bar { height: 3px; background: var(--bg2); margin: 0 0 2px; border-radius: 0; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width 0.4s; background: #1D9E75; }

  /* spine view */
  .spine-only { padding: 10px 16px; display: flex; align-items: center; }
  .spine-dots { display: flex; align-items: center; flex: 1; min-width: 0; }
  .spine-dot-sm { width: 12px; height: 12px; border-radius: 50%; border: 2px solid; flex-shrink: 0; }
  .spine-dot-sm.done    { background: #1D9E75; border-color: #1D9E75; }
  .spine-dot-sm.active  { background: #BA7517; border-color: #BA7517; }
  .spine-dot-sm.waiting { background: #185FA5; border-color: #185FA5; }
  .spine-dot-sm.blocked { background: var(--bg2); border-color: var(--border2); }
  .spine-line-sm { flex: 1; height: 2px; min-width: 4px; }
  .spine-line-sm.done    { background: #1D9E75; opacity: 0.35; }
  .spine-line-sm.active  { background: #BA7517; opacity: 0.3; }
  .spine-line-sm.waiting { background: #185FA5; opacity: 0.3; }
  .spine-line-sm.blocked { background: var(--border1); }
  .spine-label { font-size: 11px; color: var(--text2); margin-left: 10px; white-space: nowrap; min-width: 0; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }

  /* expanded steps */
  .steps-wrap { padding: 14px 16px 4px; }

  .step-row { display: flex; align-items: stretch; position: relative; border-radius: 6px; }
  .step-row.dragging { opacity: 0.55; background: var(--bg2); border-radius: 6px; }
  .step-row.drop-above::before,
  .step-row.drop-below::after {
    content: ''; position: absolute; left: 0; right: 0; height: 2px;
    background: #185FA5; border-radius: 1px; z-index: 2;
  }
  .step-row.drop-above::before { top: -1px; }
  .step-row.drop-below::after  { bottom: -1px; }

  .drag-handle { cursor: grab; color: var(--text3); font-size: 11px; padding: 2px 5px 0 0; flex-shrink: 0; user-select: none; opacity: 0; transition: opacity 0.15s; align-self: flex-start; margin-top: 2px; }
  .step-row:hover .drag-handle { opacity: 0.4; }
  .drag-handle:active { cursor: grabbing; }

  .step-spine { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; width: 20px; }
  .step-dot { width: 18px; height: 18px; border-radius: 50%; border: 2px solid; flex-shrink: 0; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.12s; z-index: 1; margin-top: 1px; }
  .step-dot:hover { transform: scale(1.18); }
  .step-dot.done    { background: #1D9E75; border-color: #1D9E75; }
  .step-dot.active  { background: #BA7517; border-color: #BA7517; }
  .step-dot.waiting { background: #185FA5; border-color: #185FA5; }
  .step-dot.blocked { background: var(--bg2); border-color: var(--border2); }
  .step-dot svg { width: 9px; height: 9px; }

  .step-line { width: 2px; flex: 1; margin-top: 3px; border-radius: 1px; }
  .step-line.done    { background: #1D9E75; opacity: 0.35; }
  .step-line.active  { background: #BA7517; opacity: 0.3; }
  .step-line.waiting { background: #185FA5; opacity: 0.3; }
  .step-line.blocked { background: var(--border1); opacity: 1; }

  .step-body { flex: 1; padding: 0 0 18px 10px; min-width: 0; }
  .step-row:last-child .step-body { padding-bottom: 6px; }

  .step-title-view { font-size: 13px; color: var(--text1); line-height: 1.4; cursor: text; border-radius: 3px; padding: 1px 3px; margin-left: -3px; transition: background 0.12s; display: inline-block; max-width: 100%; }
  .step-title-view:hover { background: var(--bg2); }
  .step-title-view.muted { color: var(--text2); }
  .step-title-input { font-size: 13px; font-family: var(--font); color: var(--text1); line-height: 1.4; border: 0.5px solid var(--border3); border-radius: 4px; padding: 1px 4px; background: var(--bg); outline: none; width: 100%; }

  .step-meta { display: flex; align-items: center; gap: 6px; margin-top: 3px; flex-wrap: wrap; }
  .step-dur {
    font-size: 11px; color: var(--text2); cursor: text;
    border-radius: 20px; padding: 2px 8px;
    border: 0.5px solid var(--border2); background: var(--bg2);
    display: inline-flex; align-items: center;
    transition: background 0.12s, border-color 0.12s;
  }
  .step-dur:hover { background: var(--bg3); border-color: var(--border3); }
  .step-dur.placeholder { color: var(--text3); font-style: italic; border-color: var(--border1); background: transparent; }
  .step-dur.placeholder:hover { background: var(--bg2); border-color: var(--border2); }
  .step-dur-input { font-size: 11px; font-family: var(--font); color: var(--text2); border: 0.5px solid var(--border3); border-radius: 20px; padding: 2px 8px; background: var(--bg); outline: none; width: 110px; }

  .step-due {
    font-size: 11px; color: var(--text2); cursor: pointer;
    border-radius: 20px; padding: 2px 8px;
    border: 0.5px solid var(--border2); background: var(--bg2);
    display: inline-flex; align-items: center;
    transition: background 0.12s, border-color 0.12s, opacity 0.15s;
  }
  .step-due:hover { background: var(--bg3); border-color: var(--border3); }
  .step-due.placeholder { color: var(--text3); font-style: italic; border-color: var(--border1); background: transparent; opacity: 0.22; }
  .step-row:hover .step-due.placeholder { opacity: 1; }
  .step-due-input { font-size: 11px; font-family: var(--font); color: var(--text2); border: 0.5px solid var(--border3); border-radius: 20px; padding: 2px 8px; background: var(--bg); outline: none; cursor: pointer; }

  .tag { font-size: 10px; padding: 2px 8px; border-radius: 20px; border: 0.5px solid; font-weight: 500; }
  .tag-wait   { background: #dbeeff; color: #1d4ed8; border-color: #93c5fd; }
  .tag-active { background: #fef3c7; color: #92400e; border-color: #fcd34d; }
  .tag-done   { background: #d1fae5; color: #065f46; border-color: #6ee7b7; }

  .step-actions { display: flex; align-items: center; gap: 4px; margin-top: 5px; }
  .step-action-btn { background: none; border: none; cursor: pointer; color: var(--text3); padding: 2px 3px; border-radius: 4px; display: inline-flex; align-items: center; opacity: 0; transition: opacity 0.15s, color 0.15s, background 0.15s; flex-shrink: 0; }
  .step-row:hover .step-action-btn { opacity: 1; }
  .step-action-btn:hover { color: var(--text1) !important; background: var(--bg2); }
  .step-del-btn:hover  { color: #dc2626 !important; background: #fee2e2; }
  .step-dup-btn:hover  { color: #185FA5 !important; background: #dbeeff; }

  /* ── Step & goal notes ─────────────────────────────────────────────────── */
  .step-note {
    font-size: 11.5px; color: var(--text3); line-height: 1.4; cursor: pointer;
    border-radius: 3px; padding: 1px 3px; margin: 2px 0 0 -3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%;
    display: inline-block; transition: background 0.12s, opacity 0.15s; opacity: 0.22;
  }
  .step-note.has-note { color: var(--text2); opacity: 0.8; }
  .step-row:hover .step-note { opacity: 0.55; }
  .step-row:hover .step-note.has-note { opacity: 1; }
  .step-note:hover { background: var(--bg2); }
  .step-note a { color: var(--accent); pointer-events: auto; }

  .goal-note {
    font-size: 11px; font-style: italic; color: var(--text2);
    overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
    cursor: pointer; padding: 1px 2px; margin-left: -2px;
    border-radius: 3px; max-width: 100%; display: inline-block;
    transition: background 0.12s, opacity 0.15s; opacity: 0.22;
  }
  .goal-note.has-note { opacity: 0.7; }
  .goal-header:hover .goal-note { opacity: 0.5; }
  .goal-header:hover .goal-note.has-note { opacity: 1; }
  .goal-note:hover { background: var(--bg2); }
  .goal-note a { color: var(--accent); pointer-events: auto; }

  .add-row { padding: 4px 16px 12px; }
  .add-input { width: 100%; border: 0.5px solid var(--border2); border-radius: var(--radius-md); padding: 8px 12px; font-size: 12px; font-family: var(--font); color: var(--text1); background: var(--bg2); outline: none; }
  .add-input:focus { border-color: var(--border3); background: var(--bg); }
  .add-input::placeholder { color: var(--text3); }

  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center; z-index: 50; }
  .modal { background: var(--bg); border: 0.5px solid var(--border2); border-radius: var(--radius-lg); padding: 1.5rem; width: 340px; max-width: 92vw; }
  .modal h3 { font-size: 15px; font-weight: 500; margin-bottom: 1rem; }
  .field { margin-bottom: 10px; }
  .field label { font-size: 11px; color: var(--text2); display: block; margin-bottom: 3px; }
  .field input, .field select { width: 100%; border: 0.5px solid var(--border2); border-radius: var(--radius-md); padding: 8px 10px; font-size: 13px; font-family: var(--font); color: var(--text1); background: var(--bg2); outline: none; appearance: none; }
  .field input:focus, .field select:focus { border-color: var(--border3); background: var(--bg); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1rem; }

  .empty { text-align: center; padding: 3rem 1rem; color: var(--text2); font-size: 13px; }

  /* goal header icon buttons */
  .goal-icon-btn { background: none; border: none; cursor: pointer; color: var(--text3); padding: 3px 4px; border-radius: 4px; display: flex; align-items: center; flex-shrink: 0; opacity: 0; transition: opacity 0.15s, color 0.15s, background 0.15s; line-height: 1; }
  .goal-header:hover .goal-icon-btn { opacity: 1; }
  .goal-icon-btn:hover { color: var(--text1) !important; background: var(--bg3); }
  .goal-icon-btn.goal-del-btn:hover     { color: #dc2626 !important; background: #fee2e2; }
  .goal-icon-btn.goal-archive-btn:hover { color: #b45309 !important; background: #fef3c7; }
  .goal-icon-btn.goal-dup-btn:hover     { color: #185FA5 !important; background: #dbeeff; }
  .goal-icon-btn:disabled { opacity: 0.2 !important; cursor: default; pointer-events: none; }

  .goal-move-btns { display: flex; flex-direction: column; gap: 1px; opacity: 0; transition: opacity 0.15s; flex-shrink: 0; }
  .goal-header:hover .goal-move-btns { opacity: 1; }

  /* divider between active and archived sections */
  .archived-divider { display: flex; align-items: center; gap: 10px; padding: 4px 2px; }
  .archived-divider span { font-size: 10px; color: var(--text3); white-space: nowrap; text-transform: uppercase; letter-spacing: 0.06em; }
  .archived-divider::before, .archived-divider::after { content: ''; flex: 1; height: 1px; background: var(--border2); }

  /* step up/down buttons — mobile only */
  .step-move-btns { display: none; flex-direction: column; gap: 0; flex-shrink: 0; align-self: flex-start; }
  .step-move-btn { background: none; border: none; cursor: pointer; color: var(--text3); padding: 7px 6px; border-radius: 4px; display: flex; align-items: center; transition: color 0.12s, background 0.12s; }
  .step-move-btn:active { color: var(--text1); background: var(--bg2); }
  .step-move-btn:disabled { opacity: 0.2; pointer-events: none; }

  /* three-dot goal menu — mobile only */
  .goal-menu-btn { display: none; background: none; border: none; cursor: pointer; color: var(--text2); padding: 7px 6px; border-radius: 6px; align-items: center; flex-shrink: 0; transition: background 0.15s; }
  .goal-menu-btn:active { background: var(--bg2); }

  /* save status indicator */
  .save-status {
    display: flex; align-items: center;
    gap: 5px; font-size: 11px; color: var(--text3);
    opacity: 0; transition: opacity 0.4s;
    pointer-events: none; user-select: none; white-space: nowrap;
  }
  .save-status.error  { pointer-events: auto; }
  .save-status.saved  { pointer-events: auto; cursor: pointer; }
  .save-status.visible { opacity: 1; }
  .save-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text3); flex-shrink: 0; transition: background 0.2s;
  }
  .save-status.saving .save-dot { background: #F5A623; }
  .save-status.saved  .save-dot { background: #1D9E75; }
  .save-status.error  .save-dot { background: #dc2626; }
  .save-error-link {
    cursor: pointer; text-decoration: underline;
    text-decoration-color: transparent; text-underline-offset: 2px;
    transition: text-decoration-color 0.15s;
  }
  .save-error-link:hover { text-decoration-color: currentColor; }

  /* ── Hamburger menu button ── */
  .btn-menu {
    width:34px; height:34px; padding:0; display:flex; align-items:center; justify-content:center;
    border-radius:var(--radius-md); color:var(--text2); flex-shrink:0;
    transition:background 0.15s, color 0.15s;
  }
  .btn-menu:hover { background:var(--bg3) !important; color:var(--text1) !important; border-color:transparent !important; }

  /* ── Side menu panel ── */
  .menu-overlay {
    position:fixed; inset:0; z-index:100; background:rgba(0,0,0,0);
    transition:background 0.25s; pointer-events:none;
  }
  .menu-overlay.open { background:rgba(0,0,0,0.35); pointer-events:auto; }
  .menu-panel {
    position:fixed; top:0; right:0; bottom:0; width:300px; max-width:90vw;
    background:var(--bg); border-left:0.5px solid var(--border2);
    transform:translateX(100%); transition:transform 0.28s cubic-bezier(0.4,0,0.2,1);
    z-index:101; display:flex; flex-direction:column; overflow-y:auto;
  }
  .menu-panel.open { transform:translateX(0); }
  .menu-panel-head {
    padding:20px 18px 16px; border-bottom:0.5px solid var(--border1);
    display:flex; align-items:flex-start; justify-content:space-between; gap:10px;
  }
  .menu-close {
    width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    cursor:pointer; color:var(--text3); flex-shrink:0; border:none; background:none;
    font-size:17px; line-height:1; transition:background 0.12s, color 0.12s; margin-top:2px;
  }
  .menu-close:hover { background:var(--bg3); color:var(--text1); }
  .menu-section { padding:10px 18px; border-bottom:0.5px solid var(--border1); }
  .menu-section-label {
    font-size:10px; font-weight:600; color:var(--text3); text-transform:uppercase;
    letter-spacing:0.09em; margin-bottom:4px; padding:0 10px;
  }
  .menu-item {
    display:flex; align-items:center; gap:10px; width:100%;
    padding:8px 10px; border-radius:var(--radius-md);
    font-size:13px; color:var(--text1); text-align:left;
    border:none; background:none; cursor:pointer; transition:background 0.12s;
  }
  .menu-item:hover { background:var(--bg3); }
  .menu-item.muted { color:var(--text3); cursor:default; }
  .menu-item.muted:hover { background:none; }
  .menu-item-icon { width:16px; flex-shrink:0; display:flex; align-items:center; justify-content:center; opacity:0.55; }
  .menu-item-badge {
    margin-left:auto; font-size:10px; font-weight:600; letter-spacing:0.04em;
    color:var(--text3); background:var(--bg2); border:0.5px solid var(--border2);

  }
  .menu-footer { padding:14px 18px; margin-top:auto; border-top:0.5px solid var(--border1); }
  .theme-toggle {
    display:flex; background:var(--bg2); border:0.5px solid var(--border2);
    border-radius:20px; padding:2px; gap:2px;
  }
  .theme-opt {
    font-size:11px; padding:3px 9px; border-radius:16px; cursor:pointer; color:var(--text3);
    transition:background 0.12s, color 0.12s; border:none; background:none;

    .field input, .field select { font-size: 16px !important; }

    .goal-name-view { pointer-events: none; cursor: default; }
    .goal-name-view:hover { background: transparent; }
    .drag-handle { display: none; }

    .step-move-btn { padding: 4px 10px; position: relative; }
    .step-move-btn:first-child::after { content: ''; position: absolute; inset: -18px -8px -4px -8px; }
    .step-move-btn:last-child::after { content: ''; position: absolute; inset: -4px -8px -18px -8px; }
    .step-dot { width: 26px; height: 26px; }
    .step-spine { width: 26px; }
    .step-action-btn { opacity: 1 !important; padding: 6px 8px; }
    .goal-header > svg { width: 40px; height: 40px; }
    .add-input { font-size: 13px; padding: 4px 10px; }
    .add-input:focus { font-size: 16px !important; padding: 8px 12px; }

async function save(silent=false){
  if(GUEST_MODE){
    if(!silent) _demoUnsaved=true;
    localStorage.setItem(STORE_KEY, JSON.stringify({goals,gid,sid}));
    setSaveStatus('saved');
    return;
  }
  if(!silent) setSaveStatus('saving');
  try {
    const {error}=await _supabase.from('goals').upsert(
      {user_id:currentUser.id, data:{goals,gid,sid}, updated_at:new Date().toISOString()},
      {onConflict:'user_id'}
    );
    if(error) throw error;
    localStorage.setItem(STORE_KEY, JSON.stringify({goals,gid,sid})); // local cache
    if(!silent) setSaveStatus('saved');
  } catch(e){ if(!silent) setSaveStatus('error'); }
}

      const raw=localStorage.getItem(STORE_KEY);
      if(!raw){goals=DEFAULT_DATA.goals;gid=DEFAULT_DATA.gid;sid=DEFAULT_DATA.sid;showWelcome=true;return;}
      const d=JSON.parse(raw);
      goals=d.goals||[]; gid=d.gid||1; sid=d.sid||1;

    // Signed-in: load from Supabase
    const {data,error}=await _supabase.from('goals').select('data').eq('user_id',currentUser.id).maybeSingle();

      // New user — load sample data and show welcome
      goals=DEFAULT_DATA.goals;gid=DEFAULT_DATA.gid;sid=DEFAULT_DATA.sid;showWelcome=true;

function goalStatus(g){
  if(!g.steps.length)return'blocked';
  if(g.steps.every(s=>s.status==='done'))return'done';
  if(g.steps.find(s=>s.status==='active'))return'active';
  if(g.steps.find(s=>s.status==='waiting'))return'waiting';
  return'blocked';
}
function nextStep(g){return g.steps.find(s=>s.status==='active'||s.status==='waiting');}

// ── Duration utilities ───────────────────────────────────────────────────────
function applyUnit(val,unit){
  const u=unit.toLowerCase().trim();
  if(!u||u.match(/^(m|min|mins|minute|minutes)$/))return val;
  if(u.match(/^(h|hr|hrs|hour|hours)$/))return val*60;
  if(u.match(/^(d|dy|day|days)$/))return val*60*24;
  if(u.match(/^(w|wk|wks|week|weeks)$/))return val*60*24*7;
  if(u.match(/^(mo|mon|month|months)$/))return val*60*24*30;
  if(u.match(/^(y|yr|yrs|year|years)$/))return val*60*24*365;
  return null;
}
function parseDurToMins(str){
  if(!str||!str.trim())return null;
  const s=str.trim().toLowerCase().replace(/–/g,'-').replace(/\s+/g,' ');
  const rng=s.match(/^([\d.]+)\s*-\s*([\d.]+)\s*(.*)$/);
  if(rng){return applyUnit(parseFloat(rng[2]),rng[3].trim());}
  const m=s.match(/^([\d.]+)\s*(.*)$/);
  if(m)return applyUnit(parseFloat(m[1]),m[2].trim());
  return null;
}
function normUnitLabel(unit,val){
  const u=unit.toLowerCase().trim();
  if(!u||u.match(/^(m|min|mins|minute|minutes)$/))return'min';
  if(u.match(/^(h|hr|hrs|hour|hours)$/))return val===1?'hr':'hrs';
  if(u.match(/^(d|dy|day|days)$/))return val===1?'day':'days';
  if(u.match(/^(w|wk|wks|week|weeks)$/))return val===1?'wk':'wks';
  if(u.match(/^(mo|mon|month|months)$/))return'mo';
  if(u.match(/^(y|yr|yrs|year|years)$/))return val===1?'yr':'yrs';
  return unit.trim();
}
function normDur(str){
  if(!str||!str.trim())return'';
  const s=str.trim().toLowerCase().replace(/–/g,'-').replace(/\s+/g,' ');
  const rng=s.match(/^([\d.]+)\s*-\s*([\d.]+)\s*(.*)$/);
  if(rng){
    const lo=parseFloat(rng[1]),hi=parseFloat(rng[2]),unit=rng[3].trim();
    if(applyUnit(1,unit)!==null||!unit)return`${lo}–${hi} ${normUnitLabel(unit,hi)}`.trim();
    return str.trim();
  }
  const m=s.match(/^([\d.]+)\s*(.*)$/);
  if(m){
    const val=parseFloat(m[1]),unit=m[2].trim();
    if(applyUnit(val,unit)!==null)return`${m[1]} ${normUnitLabel(unit,val)}`.trim();
  }
  return str.trim();
}
function formatMins(mins){
  if(mins<60)return`${Math.round(mins)} min`;
  const h=mins/60;
  if(h<24){const wh=Math.floor(h),wm=Math.round((h-wh)*60);return wm?`${wh} hr ${wm} min`:`${wh} ${wh===1?'hr':'hrs'}`;}
  const d=h/24;
  if(d<7){const wd=Math.floor(d),whr=Math.round((d-wd)*24);return whr?`${wd} ${wd===1?'day':'days'} ${whr} hr`:`${wd} ${wd===1?'day':'days'}`;}
  const w=d/7;
  if(w<4.35){const ww=Math.floor(w),wd2=Math.round((w-ww)*7);return wd2?`${ww} ${ww===1?'wk':'wks'} ${wd2} ${wd2===1?'day':'days'}`:`${ww} ${ww===1?'wk':'wks'}`;}
  const mo=d/30;
  if(mo<12){const wmo=Math.floor(mo),wd3=Math.round((mo-wmo)*30);return wd3?`${wmo} mo ${wd3} ${wd3===1?'day':'days'}`:`${wmo} mo`;}
  const yr=Math.floor(d/365),rmo=Math.round((d-yr*365)/30);
  return rmo?`${yr} ${yr===1?'yr':'yrs'} ${rmo} mo`:`${yr} ${yr===1?'yr':'yrs'}`;
}
function goalRemainingDur(g){
  let total=0,hasAny=false;
  for(const s of g.steps){if(s.status==='done')continue;const m=parseDurToMins(s.dur);if(m!==null){total+=m;hasAny=true;}}
  return hasAny?formatMins(Math.round(total)):null;
}

// Returns the "winning" line colour between two adjacent steps.
// Rule: take the higher-ranked status; blocked always wins (stops the chain).
function spineLineClass(a, b){
  if(!b || a==='blocked' || b==='blocked') return 'blocked';
  const rank={done:3, waiting:2, active:1};
  return (rank[a]??0)>=(rank[b]??0) ? a : b;
}

function renderSpineOnly(g){
  if(!g.steps.length) return `<div class="spine-only"><span style="font-size:12px;color:var(--text3)">No steps yet — click to expand and add one.</span></div>`;
  let dots='';
  let chainBroken=false;
  g.steps.forEach((s,i)=>{
    if(i>0){
      const prev=g.steps[i-1];
      const lc=chainBroken?'blocked':spineLineClass(prev.status, s.status);
      dots+=`<div class="spine-line-sm ${lc}"></div>`;
    }
    dots+=`<div class="spine-dot-sm ${s.status}" title="${s.title}"></div>`;
    if(s.status==='blocked') chainBroken=true;
  });
  const ns=nextStep(g);
  return`<div class="spine-only">
    <div class="spine-dots">${dots}</div>
    ${ns?`<span class="spine-label">${ns.status==='waiting'?'waiting: ':'next: '}${ns.title}</span>`:''}
  </div>`;
}

// ── URL linkifier ─────────────────────────────────────────────────────────────
function linkify(str){
  const parts=[];let last=0;
  const re=/(https?:\/\/[^\s<>"']+[^\s<>"'.,!?;:])/g;
  let m;
  while((m=re.exec(str))!==null){
    if(m.index>last)parts.push({t:'text',v:str.slice(last,m.index)});
    parts.push({t:'url',v:m[0]});
    last=m.index+m[0].length;
  }
  if(last<str.length)parts.push({t:'text',v:str.slice(last)});
  return parts.map(p=>{
    if(p.t==='url'){
      const esc=p.v.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      return`<a href="${p.v}" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="color:var(--accent);text-decoration:underline;text-underline-offset:2px">${esc}</a>`;
    }
    return p.v.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }).join('');
}
// ─────────────────────────────────────────────────────────────────────────────

function renderStep(g,s,isFirst,isLast,nextS,chainBroken=false){
  const lineClass=!nextS?'blocked':chainBroken?'blocked':spineLineClass(s.status,nextS.status);
  const tag=s.status==='active'?`<span class="tag tag-active">to do</span>`
           :s.status==='waiting'?`<span class="tag tag-wait">waiting</span>`
           :s.status==='done'?`<span class="tag tag-done">done</span>`:'';
  return`<div class="step-row" id="sr-${g.id}-${s.id}" draggable="true"
    ondragstart="dStart(event,${g.id},${s.id})" ondragend="dEnd()"
    ondragover="dOver(event,${g.id},${s.id})" ondrop="dDrop(event,${g.id},${s.id})">
    <div class="step-move-btns" onclick="event.stopPropagation()">
      <button class="step-move-btn" onclick="moveStep(${g.id},${s.id},-1)" title="Move up" ${isFirst?'disabled':''}><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,8 6,3.5 10,8"/></svg></button>
      <button class="step-move-btn" onclick="moveStep(${g.id},${s.id},1)" title="Move down" ${isLast?'disabled':''}><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,4 6,8.5 10,4"/></svg></button>
    </div>
    <span class="drag-handle" title="Drag to reorder">⠿</span>
    <div class="step-spine">
      <div class="step-dot ${s.status}" onclick="cycleStatus(${g.id},${s.id})" title="Click to cycle status">${dotSvg(s.status)}</div>
      ${!isLast?`<div class="step-line ${lineClass}"></div>`:''}
    </div>
    <div class="step-body">
      <div id="tv-${g.id}-${s.id}" class="step-title-view${s.status==='blocked'?' muted':''}" onclick="editTitle(${g.id},${s.id})" title="Click to edit">${s.title}</div>
      <div class="step-meta">
        ${tag}
        <span class="step-dur${s.dur?'':' placeholder'}" onclick="editDur(${g.id},${s.id})" title="Click to edit">${s.dur||'add time est.'}</span>
        <span class="step-due${s.dueDate?'':' placeholder'}" onclick="editDueDate(${g.id},${s.id})" title="${s.dueDate?'Click to edit target date':'Click to set target date'}">${s.dueDate?formatDueDate(s.dueDate):'target date'}</span>
      </div>
      <div id="sn-${g.id}-${s.id}" class="step-note${s.note?' has-note':''}" onclick="editStepNote(${g.id},${s.id})" title="${s.note?'Click to edit note':'Click to add a note'}">${s.note?linkify(s.note.replace(/\n/g,' ')):'+ note'}</div>
      <div class="step-actions">
        ${pill('+ before',`insertStepInline(${g.id},${s.id},true)`)}
        ${pill('+ after',`insertStepInline(${g.id},${s.id})`)}
        <button class="step-action-btn step-dup-btn" onclick="duplicateStep(${g.id},${s.id})" title="Duplicate step">${ICON_COPY}</button>
        <button class="step-action-btn step-del-btn" onclick="openDeleteStep(${g.id},${s.id})" title="Delete step">${ICON_TRASH}</button>
      </div>
    </div>
  </div>`;
}

function renderGoal(g,idx,activeGoals){
  const gs=goalStatus(g),p=pct(g),ns=nextStep(g);
  const done=g.steps.filter(s=>s.status==='done').length;
  const rem=goalRemainingDur(g);
  const isFirst=idx===0, isLast=idx===activeGoals.length-1;
  const moveBtns=`<div class="goal-move-btns" onclick="event.stopPropagation()">
    <button class="goal-icon-btn" onclick="moveGoal(${g.id},-1)" title="Move up" ${isFirst?'disabled':''}><svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,7 5.5,3.5 9,7"/></svg></button>
    <button class="goal-icon-btn" onclick="moveGoal(${g.id},1)" title="Move down" ${isLast?'disabled':''}><svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,4 5.5,7.5 9,4"/></svg></button>
  </div>`;
  const dupBtn    =`<button class="goal-icon-btn goal-dup-btn"     onclick="event.stopPropagation();openDuplicateGoal(${g.id})" title="Duplicate goal">${ICON_COPY}</button>`;
  const archiveBtn=`<button class="goal-icon-btn goal-archive-btn" onclick="event.stopPropagation();openArchiveGoal(${g.id})" title="Archive goal">${ICON_ARCHIVE}</button>`;
  const trashBtn  =`<button class="goal-icon-btn goal-del-btn"     onclick="event.stopPropagation();openDeleteGoal(${g.id})" title="Delete goal">${ICON_TRASH}</button>`;
  const menuBtn   =`<button class="goal-menu-btn" onclick="event.stopPropagation();openGoalMenu(${g.id},this,false)" title="Options">${ICON_MENU}</button>`;

  const bodyContent=g.expanded
    ?`${ns?`<div class="next-banner">
        <div class="next-dot" style="background:${ns.status==='waiting'?'#185FA5':'#BA7517'}"></div>
        <div>
          <div class="next-label">${ns.status==='waiting'?'Waiting on':'Next action'}</div>
          <div class="next-text">${ns.title}</div>
          ${ns.dur?`<div class="next-dur">${ns.dur}${ns.wait?' — nothing to do':''}</div>`:''}
        </div>
      </div>`:''}
     <div class="progress-bar"><div class="progress-fill" style="width:${p}%"></div></div>
     <div class="steps-wrap">${(()=>{let cb=false;return g.steps.map((s,i)=>{const r=renderStep(g,s,i===0,i===g.steps.length-1,g.steps[i+1]||null,cb);if(s.status==='blocked')cb=true;return r;}).join('');})()}</div>
     <div class="add-row"><input class="add-input" id="ai-${g.id}" placeholder="+ add step" onkeydown="handleAdd(event,${g.id})" onblur="handleAdd(event,${g.id})"></div>`
    :renderSpineOnly(g);

  return`<div class="goal-card${g.expanded?' expanded':''}" id="gc-${g.id}">
    <div class="goal-header" onclick="toggleGoal(${g.id})">
      ${ring(p,gs)}
      <div class="goal-meta">
        <div class="goal-name"><span class="goal-name-view" onclick="event.stopPropagation();editGoalName(${g.id})" title="Click to rename">${g.name}</span></div>
        <div class="goal-sub">${done} of ${g.steps.length} steps complete${rem?` · ${rem} remaining`:''}${g.dueDate?` · <span class="goal-due-badge" onclick="event.stopPropagation();editGoalDate(${g.id})" title="Click to edit target date"><i>target:</i> ${formatDueDate(g.dueDate)}</span>`:`<span class="goal-due-add" onclick="event.stopPropagation();editGoalDate(${g.id})" title="Set target date"> · target date</span>`}</div>
        <div id="gn-${g.id}" class="goal-note${g.note?' has-note':''}" onclick="event.stopPropagation();editGoalNote(${g.id})" title="${g.note?'Click to edit note':'Click to add a note'}">${g.note?linkify(g.note):'+ note'}</div>
      </div>
      ${moveBtns}
      ${dupBtn}
      ${archiveBtn}
      ${trashBtn}
      ${menuBtn}
      <span class="status-badge ${badgeClass(gs)}">${badgeLabel(gs)}</span>
      <span class="chevron">▶</span>
    </div>
    <div class="goal-body">${bodyContent}</div>
  </div>`;
}

function renderArchivedGoal(g){
  const p=pct(g);
  const done=g.steps.filter(s=>s.status==='done').length;
  const rem=goalRemainingDur(g);
  const unarchiveBtn=`<button class="goal-icon-btn goal-archive-btn" onclick="doUnarchiveGoal(${g.id})" title="Restore goal">${ICON_UNARCHIVE}</button>`;
  const dupBtn      =`<button class="goal-icon-btn goal-dup-btn"     onclick="openDuplicateGoal(${g.id})" title="Duplicate goal">${ICON_COPY}</button>`;
  const trashBtn    =`<button class="goal-icon-btn goal-del-btn"     onclick="openDeleteGoal(${g.id})" title="Delete goal">${ICON_TRASH}</button>`;
  const menuBtn     =`<button class="goal-menu-btn" onclick="openGoalMenu(${g.id},this,true)" title="Options">${ICON_MENU}</button>`;
  return`<div class="goal-card archived" id="gc-${g.id}">
    <div class="goal-header">
      ${ring(p,'blocked')}
      <div class="goal-meta">
        <div class="goal-name">${g.name}</div>
        <div class="goal-sub">${done} of ${g.steps.length} steps complete${rem?` · ${rem} remaining`:''}</div>
      </div>
      ${unarchiveBtn}
      ${dupBtn}
      ${trashBtn}
      ${menuBtn}
      <span class="status-badge s-archived">archived</span>
    </div>
  </div>`;
}

function render(silent=false){
  const active=goals.filter(g=>!g.archived);
  const archived=goals.filter(g=>g.archived).sort((a,b)=>b.archivedAt-a.archivedAt);
  let html='';
  if(!active.length&&!archived.length){
    html=`<div class="empty">No goals yet — click "+ New goal" to start.</div>`;
  } else {
    html+=active.map((g,i)=>renderGoal(g,i,active)).join('');
    if(archived.length){
      if(active.length) html+=`<div class="archived-divider"><span>Archived</span></div>`;
      html+=archived.map(g=>renderArchivedGoal(g)).join('');
    }
  }
  document.getElementById('root').innerHTML=html;
  save(silent);
  fixSpineLabels();
}

function fixSpineLabels(){
  requestAnimationFrame(()=>{
    document.querySelectorAll('.spine-only').forEach(row=>{
      const dots=row.querySelector('.spine-dots');
      const label=row.querySelector('.spine-label');
      if(!dots||!label)return;
      dots.style.overflow='';
      label.style.display='';
      const crowded=dots.scrollWidth>dots.clientWidth;
      label.style.display=crowded?'none':'';
      dots.style.overflow=crowded?'hidden':'';
    });
  });
}
window.addEventListener('resize',fixSpineLabels);

function toggleGoal(id){const g=goals.find(x=>x.id===id);if(g&&!g.archived)g.expanded=!g.expanded;render(true);}
function cycleStatus(gId,sId){
  const g=goals.find(x=>x.id===gId),s=g.steps.find(x=>x.id===sId);
  s.status=STATUSES[(STATUSES.indexOf(s.status)+1)%STATUSES.length];render();
}

// ── Delete step (with confirm) ───────────────────────────────────────────────
function openDeleteStep(gId,sId){
  const g=goals.find(x=>x.id===gId),s=g&&g.steps.find(x=>x.id===sId);if(!s)return;
  document.getElementById('modal-container').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <h3>Delete step?</h3>
      <p style="font-size:13px;color:var(--text2);margin-bottom:1rem;line-height:1.5">
        "<strong style="color:var(--text1)">${s.title}</strong>" will be permanently removed. This can't be undone.
      </p>
      <div class="modal-actions">
        <button class="btn" onclick="closeModal()">Cancel</button>
        <button class="btn" style="background:#fee2e2;border-color:#fca5a5;color:#dc2626" onclick="doDeleteStep(${gId},${sId})">Delete step</button>
      </div>
    </div>
  </div>`;
}
function doDeleteStep(gId,sId){const g=goals.find(x=>x.id===gId);g.steps=g.steps.filter(s=>s.id!==sId);closeModal();render();}

// ── Duplicate step ───────────────────────────────────────────────────────────
function duplicateStep(gId,sId){
  const g=goals.find(x=>x.id===gId);
  if(GUEST_MODE&&g.steps.length>=DEMO_STEP_LIMIT){openDemoLimitModal('step');return;}
  const idx=g.steps.findIndex(s=>s.id===sId);
  const s=g.steps[idx];
  g.steps.splice(idx+1,0,{...s,id:sid++});
  render();
}

// ── Duplicate goal ───────────────────────────────────────────────────────────
function openDuplicateGoal(id){
  const g=goals.find(x=>x.id===id);if(!g)return;
  document.getElementById('modal-container').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:0.75rem">
        <h3 style="margin:0">Duplicate goal</h3>
        <button onclick="closeModal()" style="background:none;border:none;cursor:pointer;color:var(--text3);padding:2px 4px;font-size:16px;line-height:1;border-radius:4px" title="Cancel">✕</button>
      </div>
      <p style="font-size:13px;color:var(--text2);margin-bottom:1rem;line-height:1.6">
        A copy of <strong style="color:var(--text1)">${g.name}</strong> will be added below. Do you want to include the steps?
      </p>
      <div class="modal-actions">
        <button class="btn" onclick="doDuplicateGoal(${id},false)">Without steps</button>
        <button class="btn btn-primary" onclick="doDuplicateGoal(${id},true)">With steps</button>
      </div>
    </div>
  </div>`;
}
function doDuplicateGoal(id,withSteps){
  const g=goals.find(x=>x.id===id);if(!g)return;
  if(GUEST_MODE&&goals.length>=DEMO_GOAL_LIMIT){closeModal();openDemoLimitModal('goal');return;}
  const newGoal={
    id:gid++,
    name:makeCopyName(g.name),
    expanded:false,
    archived:false,
    archivedAt:null,
    dueDate:g.dueDate||'',
    note:g.note||'',
    steps:withSteps?g.steps.map(s=>({...s,id:sid++})):[],
  };
  const idx=goals.indexOf(g);
  goals.splice(idx+1,0,newGoal);
  closeModal();render();
}

function moveGoal(id,dir){
  const active=goals.filter(g=>!g.archived);
  const i=active.findIndex(x=>x.id===id);
  const ni=i+dir;
  if(ni<0||ni>=active.length)return;
  const gi=goals.indexOf(active[i]);
  const gni=goals.indexOf(active[ni]);
  [goals[gi],goals[gni]]=[goals[gni],goals[gi]];
  render();
}
function moveStep(gId,sId,dir){
  const g=goals.find(x=>x.id===gId);
  const i=g.steps.findIndex(s=>s.id===sId);
  const ni=i+dir;
  if(ni<0||ni>=g.steps.length)return;
  [g.steps[i],g.steps[ni]]=[g.steps[ni],g.steps[i]];
  render();
}

function editGoalName(id){
  const g=goals.find(x=>x.id===id);
  const span=document.querySelector(`#gc-${id} .goal-name-view`);if(!span)return;
  const inp=document.createElement('input');
  inp.className='goal-name-input';inp.value=g.name;
  inp.onclick=e=>e.stopPropagation();
  span.replaceWith(inp);inp.focus();inp.select();
  const commit=()=>{const v=inp.value.trim();if(v)g.name=v;render();};
  inp.addEventListener('blur',commit);
  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter'){e.stopPropagation();inp.blur();}
    if(e.key==='Escape'){inp.value=g.name;inp.blur();}
  });
}
function editTitle(gId,sId){
  const g=goals.find(x=>x.id===gId),s=g.steps.find(x=>x.id===sId);
  const view=document.getElementById(`tv-${gId}-${sId}`);if(!view)return;
  const inp=document.createElement('input');inp.className='step-title-input';inp.value=s.title;
  view.replaceWith(inp);inp.focus();inp.select();
  const commit=()=>{const v=inp.value.trim();if(v)s.title=v;render();};
  inp.addEventListener('blur',commit);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')inp.blur();if(e.key==='Escape'){inp.value=s.title;inp.blur();}});
}
function formatDueDate(iso){
  if(!iso)return'';
  const d=new Date(iso+'T00:00:00');
  const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const str=`${mo[d.getMonth()]} ${d.getDate()}`;

function editDueDate(gId,sId){

function handleAdd(e,gId){

  const inp=document.getElementById(`ai-${gId}`);
  const title=inp.value.trim();if(!title)return;
  const g=goals.find(x=>x.id===gId);
  if(GUEST_MODE&&g.steps.length>=DEMO_STEP_LIMIT){inp.value='';openDemoLimitModal('step');return;}
  g.steps.push({id:sid++,title,status:'blocked',dur:'',dueDate:'',wait:false,note:''});
  inp.value='';render();
  if(e.type==='keydown')setTimeout(()=>{const el=document.getElementById(`ai-${gId}`);if(el)el.focus();},30);

function dStart(e,gId,sId){dragging=sId;dragGoalId=gId;setTimeout(()=>{const el=document.getElementById(`sr-${gId}-${sId}`);if(el)el.classList.add('dragging');},0);e.dataTransfer.effectAllowed='move';}
function dEnd(){document.querySelectorAll('.step-row').forEach(el=>el.classList.remove('dragging','drop-above','drop-below'));dragging=null;dragGoalId=null;}
function dOver(e,gId,sId){
  if(!dragging||gId!==dragGoalId)return;e.preventDefault();e.dataTransfer.dropEffect='move';
  document.querySelectorAll('.step-row').forEach(el=>el.classList.remove('drop-above','drop-below'));
  if(sId===dragging)return;
  const el=document.getElementById(`sr-${gId}-${sId}`);if(!el)return;
  const rect=el.getBoundingClientRect();
  el.classList.add(e.clientY<rect.top+rect.height/2?'drop-above':'drop-below');
}
function dDrop(e,gId,sId){
  if(!dragging||gId!==dragGoalId||sId===dragging)return;e.preventDefault();
  const el=document.getElementById(`sr-${gId}-${sId}`);
  const rect=el?el.getBoundingClientRect():null;
  const insertBefore=rect?e.clientY<rect.top+rect.height/2:true;
  const g=goals.find(x=>x.id===gId);
  const fi=g.steps.findIndex(s=>s.id===dragging);
  const[item]=g.steps.splice(fi,1);
  const ti=g.steps.findIndex(s=>s.id===sId);
  g.steps.splice(insertBefore?ti:ti+1,0,item);
  render();
}

function insertStepInline(gId,refSid,before=false){
  const g=goals.find(x=>x.id===gId);
  if(GUEST_MODE&&g.steps.length>=DEMO_STEP_LIMIT){openDemoLimitModal('step');return;}
  const idx=g.steps.findIndex(s=>s.id===refSid);
  const newStep={id:sid++,title:'',status:'blocked',dur:'',dueDate:'',wait:false,note:''};
  g.steps.splice(before?idx:idx+1,0,newStep);
  render();

}

function handleImportFile(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=evt=>{
    try {
      const d=JSON.parse(evt.target.result);
      if(!d.goals)throw new Error('invalid');
      if(GUEST_MODE){
        const overGoal=d.goals.length>DEMO_GOAL_LIMIT;
        const overStep=d.goals.some(g=>g.steps&&g.steps.length>DEMO_STEP_LIMIT);
        if(overGoal||overStep){
          e.target.value='';
          document.getElementById('modal-container').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()">
            <div class="modal" style="width:360px">
              <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:0.75rem">
                <h3 style="margin:0">File exceeds demo limits</h3>
                <button onclick="closeModal()" style="background:none;border:none;cursor:pointer;color:var(--text3);padding:2px 4px;font-size:16px;line-height:1;border-radius:4px">✕</button>
              </div>
              <p style="font-size:13px;color:var(--text2);line-height:1.65;margin-bottom:0.75rem">This file contains ${d.goals.length} goals — the demo is limited to ${DEMO_GOAL_LIMIT} goals and ${DEMO_STEP_LIMIT} steps per goal.</p>
              <p style="font-size:13px;color:var(--text2);line-height:1.65;margin-bottom:1.25rem">Create a free account to import files of any size.</p>
              <button class="btn btn-primary" onclick="window.location.href='spine-goals_login.html?mode=signup'" style="width:100%;padding:10px;font-size:13px;font-weight:500;margin-bottom:8px">Create a free account</button>
              <button class="btn" onclick="closeModal()" style="width:100%;padding:10px;font-size:13px;font-weight:500">Cancel</button>
            </div>
          </div>`;
          return;
        }
      }
      goals=d.goals; gid=d.gid||1; sid=d.sid||1;
      render();
      alert('Imported successfully.');
    } catch(err){ alert('Could not read that file — make sure it\'s a Goal Tracker export.'); }
    e.target.value='';
  };
  reader.readAsText(file);
}

// ── Welcome modal — shown once on first-ever session ─────────────────────────
function openWelcome(){
  const logoSvg=getLogoSvg('44px','0 auto');
  if(GUEST_MODE){
    // Guest / demo path — explain limitations, prompt to create account
    document.getElementById('modal-container').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()">
      <div class="modal" style="width:380px;text-align:center;padding:2rem 1.75rem 1.5rem">
        ${logoSvg}
        <div style="display:inline-block;margin:14px 0 16px;font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);background:var(--bg2);border:0.5px solid var(--border2);border-radius:20px;padding:3px 10px">Demo mode</div>
        <p style="font-size:13.5px;line-height:1.7;color:var(--text1);margin-bottom:1rem;text-align:left">
          Welcome to Spine Goals — feel free to explore everything and try it out.
        </p>
        <div style="border:0.5px solid var(--border1);border-radius:var(--radius-md);padding:14px 16px;margin-bottom:1.25rem;text-align:left">
          <div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.05em">Heads up</div>
          <p style="font-size:13px;line-height:1.65;color:var(--text2);margin:0">You're in demo mode — your changes are only saved to this browser session and won't follow you across devices or visits. Create a free account to save your goals properly and access them anywhere.</p>
        </div>

        <button class="btn" onclick="closeModal()" style="width:100%;padding:10px;font-size:13px;font-weight:500;margin-bottom:12px">Start exploring</button>
        <p style="font-size:11px;color:var(--text3);line-height:1.5">Questions or feedback? <a href="mailto:hello@spinegoals.com" style="color:var(--text3);text-decoration:underline;text-underline-offset:2px">hello@spinegoals.com</a></p>
      </div>
    </div>`;
  } else {
    // Signed-in / regular path — confirm auto-save, mention manual export
    document.getElementById('modal-container').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()">
      <div class="modal" style="width:380px;text-align:center;padding:2rem 1.75rem 1.5rem">
        ${logoSvg}
        <div style="display:inline-block;margin:14px 0 16px;font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);background:var(--bg2);border:0.5px solid var(--border2);border-radius:20px;padding:3px 10px">Alpha Preview</div>
        <p style="font-size:13.5px;line-height:1.7;color:var(--text1);margin-bottom:1rem;text-align:left">
          Spine Goals is an early-access goal planning tool, currently in alpha and actively being built. You're viewing a live preview and things may change as we develop.
        </p>
        <div style="border:0.5px solid var(--border1);border-radius:var(--radius-md);padding:14px 16px;margin-bottom:10px;text-align:left">
          <div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.05em">Sample data</div>
          <p style="font-size:13px;line-height:1.65;color:var(--text2);margin:0">The goals you see are examples to help you get familiar with the app. Feel free to edit or delete them and start fresh whenever you're ready.</p>
        </div>
        <div style="border:0.5px solid var(--border1);border-radius:var(--radius-md);padding:14px 16px;margin-bottom:1.25rem;text-align:left">
          <div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.05em">Your data is safe</div>
          <p style="font-size:13px;line-height:1.65;color:var(--text2);margin:0">Your goals are saved securely to your account and synced across your devices. We don't sell or share your data. You can also manually export a backup anytime from the <strong style="color:var(--text1)">menu &rsaquo; Data</strong> in the top right.</p>

async function saveAccountName(){
  const val=document.getElementById('acct-name').value.trim();
  const msg=document.getElementById('acct-name-msg');
  if(!val){msg.style.color='#dc2626';msg.textContent='Please enter a name.';return;}
  msg.style.color='var(--text3)';msg.textContent='Saving…';
  const {error}=await _supabase.auth.updateUser({data:{full_name:val}});
  if(error){msg.style.color='#dc2626';msg.textContent=error.message;}
  else{
    currentUser.user_metadata=currentUser.user_metadata||{};
    currentUser.user_metadata.full_name=val;
    msg.style.color='#1D9E75';msg.textContent='✓ Name updated';
  }
}

async function saveAccountEmail(){
  const val=document.getElementById('acct-email').value.trim();
  const msg=document.getElementById('acct-email-msg');
  if(!val||!val.includes('@')){msg.style.color='#dc2626';msg.textContent='Please enter a valid email.';return;}
  msg.style.color='var(--text3)';msg.textContent='Saving…';
  const {error}=await _supabase.auth.updateUser({email:val});
  if(error){msg.style.color='#dc2626';msg.textContent=error.message;}
  else{msg.style.color='#1D9E75';msg.textContent='✓ Confirmation sent to both addresses';}
}

    </div>
  </div>`;
  // Enable button style when checkbox checked
  document.getElementById('delete-confirm-check').addEventListener('change',function(){

async function deleteAccount(){
  const btn=document.getElementById('delete-account-btn');
  btn.disabled=true;btn.textContent='Deleting…';
  try{
    // Delete all user data first
    await _supabase.from('goals').delete().eq('user_id',currentUser.id);
    // Delete the auth user via RPC (requires delete_user function in Supabase)
    const {error}=await _supabase.rpc('delete_user');
    if(error) throw error;
    await _supabase.auth.signOut();
    localStorage.removeItem(STORE_KEY);
    window.location.href='spine-goals_login.html';
  } catch(e){
    btn.disabled=false;btn.textContent='Delete my account';
    const p=document.createElement('p');
    p.style.cssText='font-size:11px;color:#dc2626;margin-top:8px;text-align:right';
    p.textContent=e.message||'Something went wrong. Please try again or contact support.';
    btn.parentElement.after(p);
  }
}

// Restore theme preference before first paint
(function(){ const t=localStorage.getItem('spine-theme'); if(t&&t!=='auto') document.documentElement.setAttribute('data-theme',t); })();

// ── Session check + app init ──────────────────────────────────────────────────
(async()=>{
  const urlGuest=new URLSearchParams(window.location.search).get('guest')==='true';
  if(urlGuest){
    GUEST_MODE=true;
    // Clear demo data when the user leaves — next visit always starts fresh
    window.addEventListener('beforeunload',()=>localStorage.removeItem(STORE_KEY));
  } else {
    const {data:{session}}=await _supabase.auth.getSession();
    if(session){
      GUEST_MODE=false;
      currentUser=session.user;
    } else {
      // No session and not guest — send to login
      window.location.href='spine-goals_login.html';
      return;
    }
  }
  await load();
  render(true); // silent — don't mark as unsaved on initial load
  setSaveStatus('saved'); // show initial saved state for both guest and logged-in
  if(showWelcome) openWelcome();

  // ── Auth state listener — handle token refresh + session expiry ─────────────
  if(!GUEST_MODE){
    _supabase.auth.onAuthStateChange((event, session)=>{
      if(event==='SIGNED_OUT'){
        window.location.href='spine-goals_login.html';
      } else if(event==='TOKEN_REFRESHED' && session){
        currentUser=session.user;
      }
    });
  }
})();
